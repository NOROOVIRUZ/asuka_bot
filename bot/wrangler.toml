name = "asuka-bot"
main = "src/index.ts"
compatibility_date = "2026-05-04"

[vars]
GITHUB_OWNER = "NOROOVIRUZ"
GITHUB_REPO = "asuka_bot"
DATA_PATH = "docs/data.json"
CATEGORIES_PATH = "data/categories.json"
PROMPTS_PATH = "docs/prompts.json"

[ai]
binding = "AI"

# 알람 전역 스위치 — ayanami 워커(VUUI_KV)와 같은 네임스페이스 공유, 키: alarm_muted
[[kv_namespaces]]
binding = "ALARM_KV"
id = "600bbb5294b547e9bb3084d4f1f184d4"

# 주간 다이제스트 — 월요일 00:00 UTC = 월요일 09:00 KST
[triggers]
crons = ["0 0 * * 1"]

# 시크릿은 wrangler secret put 으로 등록:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put WEBHOOK_SECRET
#   wrangler secret put ALLOWED_USER_IDS
