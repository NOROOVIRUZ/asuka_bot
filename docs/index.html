<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF003C" />
  <title>noroovirus · 대시보드</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1 class="hero-title">asuka 봇</h1>
      <div class="hero-sign">MADE BY NOROOVIRUS</div>
      <p class="hero-desc">GitHub 저장소 · 프롬프트 대시보드</p>
      <div class="hero-stats" id="brandStats">—</div>
    </section>

    <section class="search-section">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.8-3.8"/></svg>
        <input
          id="searchInput"
          type="search"
          placeholder="저장소 · 설명 · 태그 검색"
          autocomplete="off"
        />
        <button id="clearSearch" class="clear-btn" aria-label="검색 지우기" hidden>✕</button>
      </div>
      <div class="sort-box">
        <select id="sortSelect">
          <option value="saved_desc">최근 저장순</option>
          <option value="stars_desc">⭐ 별 많은순</option>
          <option value="stars_asc">⭐ 별 적은순</option>
          <option value="name_asc">이름순 (가나다)</option>
        </select>
      </div>
    </section>

    <nav class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="repos">📦 저장소</button>
      <button class="mode-tab" data-mode="prompts">✍️ 프롬프트</button>
    </nav>

    <nav class="workspace-tabs" id="workspaceTabs"></nav>

    <section class="filter-section">
      <div class="chip-row" id="categoryChips"></div>
    </section>

    <section class="result-info">
      <span id="resultCount">—</span>
    </section>

    <div id="mainContent"></div>

    <section class="empty-state" id="emptyState" hidden>
      <div class="empty-emoji">🤔</div>
      <div class="empty-title">검색 결과가 없어</div>
      <div class="empty-sub">다른 키워드 또는 카테고리로 다시 시도해줘</div>
    </section>
  </main>

  <footer class="app-footer">
    <span>powered by</span>
    <strong>asuka 봇</strong>
    <span>·</span>
    <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="./app.js" defer></script>
</body>
</html>
